name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black check
        run: black --check src tests

      - name: Run Flake8
        run: flake8 src tests

      - name: Run Pytest
        run: PYTHONPATH=src pytest

      - name: Run ML pipeline
        run: PYTHONPATH=src python src/mlops_lr/pipeline.py

      - name: Verify pipeline outputs
        run: |
          test -f data/raw.csv
          test -f data/processed.csv
          test -f models/logistic_regression.pkl
          test -f reports/metrics.json
          test -f reports/confusion_matrix.png

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            reports/metrics.json
            reports/confusion_matrix.png
            models/logistic_regression.pkl
      - name: Build Docker image
        run: docker build -t mlops-logistic-regression-api .
  
  load-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API stack
        run: |
          docker compose up -d --build api
          sleep 15

      - name: Run Locust headless load test
        run: |
          locust -f locustfile.py \
            --host http://127.0.0.1:8000 \
            --users 5 \
            --spawn-rate 1 \
            --run-time 30s \
            --headless \
            --csv reports/load_tests/ci_locust

      - name: Summarize and validate load test
        run: |
          python scripts/summarize_load_test.py \
            --stats-path reports/load_tests/ci_locust_stats.csv \
            --output-path reports/load_tests/ci_locust_summary.json \
            --max-failure-count 0 \
            --max-average-response-time-ms 1000

      - name: Upload load test reports
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: reports/load_tests/